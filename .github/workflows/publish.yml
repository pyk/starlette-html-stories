name: Publish to PyPI

on:
    release:
        types: [published]

jobs:
    pypi-publish:
        name: Build and upload to PyPI
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v8.0.0
            - uses: extractions/setup-just@v3
              with:
                  just-version: 1.49.0
            - run: just build
            - run: uv publish
